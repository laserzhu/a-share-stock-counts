name: Fetch A-Share Stock Counts

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    # 每个工作日北京时间 09:15 到 15:00 之间，每 5 分钟运行一次
    # 对应 UTC 时间 01:15 到 07:00
    - cron: '*/5 1-7 * * 1-5'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests chinesecalendar

      - name: Run script
        env:
          QYWECHAT_KEY: ${{ secrets.QYWECHAT_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py
