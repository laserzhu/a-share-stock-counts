name: 监测A股大盘行情
# 強制重新註冊 schedule - debug resync 2026-03-10

on:
  workflow_dispatch: # 手动触发
  push:
    branches: [master]

  schedule:
    # 每5分钟运行一次（UTC 00-18 = 北京时间 08:00-02:59）
    - cron: '*/5 0-18 * * *'

    # 每5分钟运行一次（UTC 20-23 = 北京时间 04:00-07:59）
    - cron: '*/5 20-23 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests chinesecalendar

      - name: Run script
        env:
          QYWECHAT_KEY: ${{ secrets.QYWECHAT_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py

      - name: Commit status file
        if: github.event_name == 'schedule' && success()
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add status.json
          git commit -m "Update status.json for scheduled run" || echo "No changes to commit"
          git push
