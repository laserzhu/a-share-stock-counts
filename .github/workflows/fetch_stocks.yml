name: 监测A股大盘行情

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    # 每个工作日北京时间 09:00 到 15:00 之间，每 5 分钟运行一次
    # 对应 UTC 时间 01:00 到 07:00
    - cron: '*/5 1-7 * * 1-5'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许写入文件，用于保存 status.json
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests chinesecalendar

      - name: Run script
        env:
          QYWECHAT_KEY: ${{ secrets.QYWECHAT_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py

      - name: Commit status file
        if: github.event_name == 'schedule' && success()
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add status.json
          git commit -m "Update status.json for scheduled run" || echo "No changes to commit"
          git push
